<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>円形ブロック崩し（フルコントロール版）</title>
<style>
  body { background: #111; color: #eee; text-align: center; font-family: sans-serif; margin: 0; overflow: hidden; }
  /* 枠線を戻しました */
  canvas { background: #000; border: 1px solid #555; margin-top: 10px; }
</style>
</head>
<body>
<h2>円形ブロック崩し</h2>
<p>操作：マウス移動(回転) / 画面のどこでもクリック or スペース(ビーム発射)</p>
<canvas id="game" width="600" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = 600, H = 600, cx = 300, cy = 300;
const fieldRadius = 260, blockRadius = 200, paddleRadius = 170, paddleWidthAngle = Math.PI / 14;
let paddleAngle = -Math.PI / 2, lives = 10, gameOver = false;

let ball = { x: cx, y: cy, vx: 3, vy: -3, r: 8 };
let beam = null;
const blocks = [], blockSize = 20;

for (let i = 0; i < 36; i++) {
    const angle = (i / 36) * Math.PI * 2;
    blocks.push({ x: cx + Math.cos(angle) * blockRadius, y: cy + Math.sin(angle) * blockRadius, alive: true });
}

window.addEventListener("keydown", e => { if (e.key === " ") fireBeam(); });
// ビーム発射もwindow全体に適用
window.addEventListener("mousedown", fireBeam);

function fireBeam() {
    if (beam || gameOver) return;
    const speed = 12;
    beam = {
        x: cx + Math.cos(paddleAngle) * paddleRadius,
        y: cy + Math.sin(paddleAngle) * paddleRadius,
        vx: Math.cos(paddleAngle + Math.PI) * speed,
        vy: Math.sin(paddleAngle + Math.PI) * speed,
        isPowerful: false
    };
}

// パドル回転操作
window.addEventListener("mousemove", e => {
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    paddleAngle = Math.atan2(mouseY - cy, mouseX - cx);
});

function update() {
    if (gameOver) return;

    if (beam) {
        beam.x += beam.vx; beam.y += beam.vy;
        
        if (Math.hypot(beam.x - ball.x, beam.y - ball.y) < 25) {
            beam.isPowerful = true;
            const angleToCenter = Math.atan2(cy - ball.y, cx - ball.x);
            const speedBeam = Math.hypot(beam.vx, beam.vy);
            beam.vx = Math.cos(angleToCenter) * speedBeam;
            beam.vy = Math.sin(angleToCenter) * speedBeam;

            const angleFromCenter = Math.atan2(ball.y - cy, ball.x - cx);
            const speedBall = Math.hypot(ball.vx, ball.vy);
            ball.vx = Math.cos(angleFromCenter) * speedBall;
            ball.vy = Math.sin(angleFromCenter) * speedBall;
        }

        if (beam.isPowerful) {
            blocks.forEach(b => {
                if (b.alive && Math.hypot(beam.x - b.x, beam.y - b.y) < 20) {
                    b.alive = false;
                }
            });
        }
        
        if (Math.hypot(beam.x - cx, beam.y - cy) > fieldRadius) beam = null;
    }

    ball.x += ball.vx; ball.y += ball.vy;

    for (const b of blocks) {
        if (!b.alive) continue;
        if (Math.hypot(ball.x - b.x, ball.y - b.y) < ball.r + blockSize / 2) {
            b.alive = false;
            ball.vx *= -1; ball.vy *= -1;
            break;
        }
    }

    const distFromCenter = Math.hypot(ball.x - cx, ball.y - cy);
    if (Math.abs(distFromCenter - paddleRadius) < 10) {
        const angle = Math.atan2(ball.y - cy, ball.x - cx);
        let diff = angle - paddleAngle;
        diff = (diff + Math.PI) % (Math.PI * 2) - Math.PI;
        if (Math.abs(diff) < paddleWidthAngle) {
            lives--;
            if (lives <= 0) gameOver = true;
            ball.vx *= -1; ball.vy *= -1;
        }
    }

    if (distFromCenter > fieldRadius - ball.r) {
        const nx = (ball.x - cx) / distFromCenter;
        const ny = (ball.y - cy) / distFromCenter;
        const dot = ball.vx * nx + ball.vy * ny;
        ball.vx -= 2 * dot * nx;
        ball.vy -= 2 * dot * ny;
        const angle = Math.atan2(ball.vy, ball.vx) + (Math.random() - 0.5) * 0.1;
        const speed = Math.hypot(ball.vx, ball.vy);
        ball.vx = Math.cos(angle) * speed;
        ball.vy = Math.sin(angle) * speed;
        ball.x = cx + nx * (fieldRadius - ball.r);
        ball.y = cy + ny * (fieldRadius - ball.r);
    }
}

function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.strokeStyle = "#555"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(cx, cy, fieldRadius, 0, Math.PI * 2); ctx.stroke();

    ctx.fillStyle = "#4af";
    blocks.forEach(b => { if(b.alive) ctx.fillRect(b.x - blockSize/2, b.y - blockSize/2, blockSize, blockSize); });

    if (!gameOver) {
        ctx.strokeStyle = "#fa4"; ctx.lineWidth = 10;
        ctx.beginPath(); ctx.arc(cx, cy, paddleRadius, paddleAngle - paddleWidthAngle, paddleAngle + paddleWidthAngle); ctx.stroke();
    }
    
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fill();
    
    if (beam) { 
        ctx.fillStyle = "#ff0"; 
        ctx.fillRect(beam.x-15, beam.y-15, 35, 35); 
    }
    
    ctx.fillStyle = "#fff"; ctx.font = "20px Arial"; ctx.fillText("残機: " + lives, 20, 30);
    if (gameOver) ctx.fillText("GAME OVER", W/2-60, H/2);
    
    update();
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
